# ============================================================
# Optimization Tournament - 10 Team Parameter Profiles
# MAXIMALLY DIFFERENTIATED to avoid symbol overlap
# Key differentiators: scanner thresholds, grid geometry, bias philosophy
# ============================================================

# Team Alpha: Aggressive High-Frequency
# Philosophy: Tight spacing, many symbols, cast the widest net with low quality bar
# Targets: Any coin with minimal liquidity, floods the order book
alpha:
  grid:
    range_atr_multiplier: 1.2
    min_range_pct: 0.6
    max_range_pct: 6.0
    recenter_interval_minutes: 30
    recenter_threshold_pct: 1.0
    leverage: 8
    qty_per_level_pct: 1.2
    max_open_levels: 14
    max_symbols: 18
    min_spacing_pct: 0.45
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.45
      min_levels: 10
      max_levels: 28
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 4
      low_vol_multiplier: 0.6
      high_vol_multiplier: 1.2
      vol_ratio_low_threshold: 0.4
      vol_ratio_high_threshold: 1.3
    bias:
      enabled: false
      threshold: 0.30
      max_level_shift: 0
      ema_weight: 0.0
      funding_rate:
        enabled: false
        weight: 0.0
      btc_eth_weight: 0.0
    mtf:
      enabled: false
    max_drawdown_pct: 30.0
  exit:
    grid_timeout_hours: 4
    hard_stop_loss_pct: 4.0
  scanner:
    max_days_since_listed: 730
    min_24h_turnover_usdt: 500000
    max_candidates: 80
    min_score: 5
  asset:
    max_daily_loss_pct: 50.0
    max_daily_trades: 1000
    consecutive_loss_cooldown_after: 12
    consecutive_loss_stop_after: 30

# Team Beta: Conservative Quality
# Philosophy: Only the best, most liquid coins. Wide spacing, strict filtering.
# Targets: Top-tier liquidity coins that have been listed for months
beta:

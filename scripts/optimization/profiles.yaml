    min_spacing_pct: 0.90
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.90
      min_levels: 3
      max_levels: 8
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 48
      low_vol_multiplier: 0.95
      high_vol_multiplier: 1.1
      vol_ratio_low_threshold: 0.8
      vol_ratio_high_threshold: 1.2
    bias:
      enabled: true
      threshold: 0.25
      max_level_shift: 1
      ema_weight: 0.3
      funding_rate:
        enabled: true
        weight: 0.2
      btc_eth_weight: 0.5
    mtf:
      enabled: true
      require_15m_alignment: true
      require_1h_alignment: true
      weight_5m: 0.1
      weight_15m: 0.3
      weight_1h: 0.6
    max_drawdown_pct: 10.0
  exit:

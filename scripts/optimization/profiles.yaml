# ============================================================
# Optimization Tournament - 10 Team Parameter Profiles
# Each team has different parameter philosophy
# ============================================================

# Team Alpha: Aggressive - Wide range, higher leverage, more symbols
# Philosophy: Cast a wide net, maximize trade frequency
alpha:
  grid:
    range_atr_multiplier: 1.5
    min_range_pct: 1.0
    max_range_pct: 10.0
    recenter_interval_minutes: 120
    recenter_threshold_pct: 2.5
    leverage: 7
    qty_per_level_pct: 2.5
    max_open_levels: 10
    max_symbols: 10
    min_spacing_pct: 0.45
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.45
      min_levels: 6
      max_levels: 20
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 12
      low_vol_multiplier: 0.7
      high_vol_multiplier: 1.6
      vol_ratio_low_threshold: 0.5
      vol_ratio_high_threshold: 1.8
    bias:
      enabled: true
      threshold: 0.10
      max_level_shift: 4
      ema_weight: 0.5
      funding_rate:
        enabled: true
        weight: 0.3
      btc_eth_weight: 0.2
    mtf:
      enabled: true
      require_15m_alignment: false   # Less restrictive
      weight_5m: 0.4
      weight_15m: 0.3
      weight_1h: 0.3
    max_drawdown_pct: 25.0
  exit:
    grid_timeout_hours: 18
    hard_stop_loss_pct: 7.0
  scanner:
    max_days_since_listed: 365
    min_24h_turnover_usdt: 2000000
    max_candidates: 60
    min_score: 15
  asset:
    max_daily_loss_pct: 40.0
    max_daily_trades: 500
    consecutive_loss_cooldown_after: 7
    consecutive_loss_stop_after: 20

# Team Beta: Conservative - Tight spacing, lower leverage, fewer symbols
# Philosophy: Quality over quantity, maximize win rate
beta:
  grid:
    range_atr_multiplier: 1.0
    min_range_pct: 0.6
    max_range_pct: 6.0
    recenter_interval_minutes: 240
    recenter_threshold_pct: 4.0
    leverage: 3
    qty_per_level_pct: 1.5
    max_open_levels: 6
    max_symbols: 5
    min_spacing_pct: 0.70
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.70
      min_levels: 4
      max_levels: 12
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 48
      low_vol_multiplier: 0.9
      high_vol_multiplier: 1.2
      vol_ratio_low_threshold: 0.7
      vol_ratio_high_threshold: 1.3
    bias:
      enabled: true
      threshold: 0.20
      max_level_shift: 2
      ema_weight: 0.5
      funding_rate:
        enabled: true
        weight: 0.3
      btc_eth_weight: 0.2
    mtf:
      enabled: true
      require_15m_alignment: true
      require_1h_alignment: true    # Stricter filtering
      weight_5m: 0.2
      weight_15m: 0.4
      weight_1h: 0.4
    max_drawdown_pct: 15.0
  exit:
    grid_timeout_hours: 36
    hard_stop_loss_pct: 3.0
  scanner:
    max_days_since_listed: 180
    min_24h_turnover_usdt: 5000000
    max_candidates: 30
    min_score: 30
  asset:
    max_daily_loss_pct: 20.0
    max_daily_trades: 200
    consecutive_loss_cooldown_after: 3
    consecutive_loss_stop_after: 8


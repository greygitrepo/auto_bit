# ============================================================
# Optimization Tournament - 3 Team Parameter Profiles
# Each team has different parameter philosophy
# ============================================================

# Team Alpha: Aggressive - Wide range, higher leverage, more symbols
# Philosophy: Cast a wide net, maximize trade frequency
alpha:
  grid:
    range_atr_multiplier: 1.5
    min_range_pct: 1.0
    max_range_pct: 10.0
    recenter_interval_minutes: 120
    recenter_threshold_pct: 2.5
    leverage: 7
    qty_per_level_pct: 2.5
    max_open_levels: 10
    max_symbols: 10
    min_spacing_pct: 0.45
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.45
      min_levels: 6
      max_levels: 20
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 12
      low_vol_multiplier: 0.7
      high_vol_multiplier: 1.6
      vol_ratio_low_threshold: 0.5
      vol_ratio_high_threshold: 1.8
    bias:
      enabled: true
      threshold: 0.10
      max_level_shift: 4
      ema_weight: 0.5
      funding_rate:
        enabled: true
        weight: 0.3
      btc_eth_weight: 0.2
    mtf:
      enabled: true
      require_15m_alignment: false   # Less restrictive
      weight_5m: 0.4
      weight_15m: 0.3
      weight_1h: 0.3
    max_drawdown_pct: 25.0
  exit:
    grid_timeout_hours: 18
    hard_stop_loss_pct: 7.0
  scanner:
    max_days_since_listed: 365
    min_24h_turnover_usdt: 2000000
    max_candidates: 60
    min_score: 15
  asset:
    max_daily_loss_pct: 40.0
    max_daily_trades: 500
    consecutive_loss_cooldown_after: 7
    consecutive_loss_stop_after: 20

# Team Beta: Conservative - Tight spacing, lower leverage, fewer symbols
# Philosophy: Quality over quantity, maximize win rate
beta:
  grid:
    range_atr_multiplier: 1.0
    min_range_pct: 0.6
    max_range_pct: 6.0
    recenter_interval_minutes: 240
    recenter_threshold_pct: 4.0
    leverage: 3
    qty_per_level_pct: 1.5
    max_open_levels: 6
    max_symbols: 5
    min_spacing_pct: 0.70
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.70
      min_levels: 4
      max_levels: 12
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 48
      low_vol_multiplier: 0.9
      high_vol_multiplier: 1.2
      vol_ratio_low_threshold: 0.7
      vol_ratio_high_threshold: 1.3
    bias:
      enabled: true
      threshold: 0.20
      max_level_shift: 2
      ema_weight: 0.5
      funding_rate:
        enabled: true
        weight: 0.3
      btc_eth_weight: 0.2
    mtf:
      enabled: true
      require_15m_alignment: true
      require_1h_alignment: true    # Stricter filtering
      weight_5m: 0.2
      weight_15m: 0.4
      weight_1h: 0.4
    max_drawdown_pct: 15.0
  exit:
    grid_timeout_hours: 36
    hard_stop_loss_pct: 3.0
  scanner:
    max_days_since_listed: 180
    min_24h_turnover_usdt: 5000000
    max_candidates: 30
    min_score: 30
  asset:
    max_daily_loss_pct: 20.0
    max_daily_trades: 200
    consecutive_loss_cooldown_after: 3
    consecutive_loss_stop_after: 8

# Team Gamma: Adaptive - Balanced parameters with strong MTF
# Philosophy: Let the market tell you, adapt to conditions
gamma:
  grid:
    range_atr_multiplier: 1.3
    min_range_pct: 0.8
    max_range_pct: 8.0
    recenter_interval_minutes: 150
    recenter_threshold_pct: 3.0
    leverage: 5
    qty_per_level_pct: 2.0
    max_open_levels: 8
    max_symbols: 8
    min_spacing_pct: 0.55
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.55
      min_levels: 5
      max_levels: 14
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 24
      low_vol_multiplier: 0.75
      high_vol_multiplier: 1.5
      vol_ratio_low_threshold: 0.6
      vol_ratio_high_threshold: 1.5
    bias:
      enabled: true
      threshold: 0.12
      max_level_shift: 3
      ema_weight: 0.4
      funding_rate:
        enabled: true
        weight: 0.35
      btc_eth_weight: 0.25
    mtf:
      enabled: true
      require_15m_alignment: true
      require_1h_alignment: false
      weight_5m: 0.3
      weight_15m: 0.4
      weight_1h: 0.3
      trend_spacing_multiplier: 1.4
      range_spacing_multiplier: 0.85
      conflicting_reduce_levels: 3
    max_drawdown_pct: 20.0
  exit:
    grid_timeout_hours: 24
    hard_stop_loss_pct: 5.0
  scanner:
    max_days_since_listed: 730
    min_24h_turnover_usdt: 3000000
    max_candidates: 50
    min_score: 20
  asset:
    max_daily_loss_pct: 30.0
    max_daily_trades: 300
    consecutive_loss_cooldown_after: 5
    consecutive_loss_stop_after: 15

# Team Delta: Scalper - Tight grids, fast recenter, high frequency
# Philosophy: Many small wins, very short holding, rapid cycling
delta:
  grid:
    range_atr_multiplier: 0.8
    min_range_pct: 0.5
    max_range_pct: 4.0
    recenter_interval_minutes: 60
    recenter_threshold_pct: 1.5
    leverage: 5
    qty_per_level_pct: 1.8
    max_open_levels: 12
    max_symbols: 12
    min_spacing_pct: 0.40
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.40
      min_levels: 8
      max_levels: 24
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 6
      low_vol_multiplier: 0.6
      high_vol_multiplier: 1.3
      vol_ratio_low_threshold: 0.5
      vol_ratio_high_threshold: 1.4
    bias:
      enabled: false         # No directional bias — pure mean reversion
      threshold: 0.30
      max_level_shift: 0
      ema_weight: 0.0
      funding_rate:
        enabled: false
        weight: 0.0
      btc_eth_weight: 0.0
    mtf:
      enabled: false         # No MTF filter — maximize fill rate
    max_drawdown_pct: 15.0
  exit:
    grid_timeout_hours: 8    # Very short grid lifetime
    hard_stop_loss_pct: 4.0
  scanner:
    max_days_since_listed: 730
    min_24h_turnover_usdt: 5000000   # High liquidity only (tighter spreads)
    max_candidates: 40
    min_score: 25
  asset:
    max_daily_loss_pct: 25.0
    max_daily_trades: 800
    consecutive_loss_cooldown_after: 8
    consecutive_loss_stop_after: 25

# Team Epsilon: Trend Rider - Strong directional bias, wide spacing, few but big trades
# Philosophy: Only trade when trend is clear, ride the momentum
epsilon:
  grid:
    range_atr_multiplier: 2.0
    min_range_pct: 1.5
    max_range_pct: 12.0
    recenter_interval_minutes: 300
    recenter_threshold_pct: 5.0
    leverage: 4
    qty_per_level_pct: 3.0
    max_open_levels: 5
    max_symbols: 6
    min_spacing_pct: 0.80
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.80
      min_levels: 3
      max_levels: 8
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 48
      low_vol_multiplier: 1.0
      high_vol_multiplier: 1.8
      vol_ratio_low_threshold: 0.8
      vol_ratio_high_threshold: 2.0
    bias:
      enabled: true
      threshold: 0.08        # Very sensitive bias — always directional
      max_level_shift: 4
      ema_weight: 0.6
      funding_rate:
        enabled: true
        weight: 0.2
      btc_eth_weight: 0.2
    mtf:
      enabled: true
      require_15m_alignment: true
      require_1h_alignment: true    # All timeframes must agree
      weight_5m: 0.2
      weight_15m: 0.3
      weight_1h: 0.5               # Heavy weight on 1h trend
      trend_spacing_multiplier: 1.5
      range_spacing_multiplier: 0.7
      conflicting_reduce_levels: 4
    max_drawdown_pct: 20.0
  exit:
    grid_timeout_hours: 48    # Long grid lifetime for trends
    hard_stop_loss_pct: 6.0
  scanner:
    max_days_since_listed: 90   # Only very new listings (high volatility)
    min_24h_turnover_usdt: 8000000
    max_candidates: 20
    min_score: 35
  asset:
    max_daily_loss_pct: 25.0
    max_daily_trades: 100
    consecutive_loss_cooldown_after: 3
    consecutive_loss_stop_after: 6

# ============================================================
# Optimization Tournament v3 - Multi-Strategy Competition
# 10 teams with 6 different strategy types
# ============================================================

# Team Alpha: Grid Bias - Aggressive wide net
alpha:
  strategy_type: grid_bias
  grid:
    range_atr_multiplier: 1.2
    min_range_pct: 0.6
    max_range_pct: 6.0
    recenter_interval_minutes: 30
    recenter_threshold_pct: 1.0
    leverage: 8
    qty_per_level_pct: 1.2
    max_open_levels: 14
    max_symbols: 18
    min_spacing_pct: 0.45
    adaptive_levels:
      enabled: true
      target_spacing_pct: 0.45
      min_levels: 6
      max_levels: 20
    dynamic_spacing:
      enabled: true
      atr_lookback_hours: 4
      low_vol_multiplier: 0.6
      high_vol_multiplier: 1.8
      vol_ratio_low_threshold: 0.4
      vol_ratio_high_threshold: 2.0
    bias:
      enabled: false
      threshold: 0.3
      max_level_shift: 0
      ema_weight: 0.0
      funding_rate:
        enabled: false
        weight: 0.0
      btc_eth_weight: 0.0
    mtf:
      enabled: false
    max_drawdown_pct: 25.0
  exit:
    grid_timeout_hours: 6
    hard_stop_loss_pct: 8.0
  scanner:
    max_days_since_listed: 730
    min_24h_turnover_usdt: 500000
    max_candidates: 80
    min_score: 5
  asset:
    max_daily_loss_pct: 40.0
    max_daily_trades: 800
    consecutive_loss_cooldown_after: 8
    consecutive_loss_stop_after: 25

# Team Beta: Breakout Scalper - BB breakout on high-liquidity
beta:
  strategy_type: breakout_scalper
  strategy_params:
    bb_period: 20
    bb_std: 2.0
    volume_multiplier: 1.3
    bb_squeeze_threshold: 0.02
    min_confidence: 0.5
  exit_params:
    stop_loss:
      atr_period: 14
      atr_multiplier: 1.5
      min_pct: 0.3
      max_pct: 2.0
    take_profit:
      risk_reward_ratio: 1.5
    trailing_stop:
      activation_r: 0.6
      callback_atr_multiplier: 0.5
    strategy_exit:
      ema_cross_exit: false
      rsi_reversal_exit: true
      volume_dry_exit: false
    time_limit:
      max_holding_minutes: 60
      warning_minutes: 50
  scanner:
    max_days_since_listed: 365
    min_24h_turnover_usdt: 10000000
    max_candidates: 30
    min_score: 25
  asset:
    max_daily_loss_pct: 25.0
    max_daily_trades: 300
    consecutive_loss_cooldown_after: 4
    consecutive_loss_stop_after: 10


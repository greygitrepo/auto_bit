# 실행 모드: paper | live
mode: paper

# 로깅
logging:
  level: INFO
  file: logs/auto_bit.log
  rotation: 10MB
  retention: 30 days

# DB
database:
  type: sqlite
  path: data/auto_bit.db

# 메인 루프
loop:
  rescan_delay_sec: 900
  health_check_sec: 60

# GUI
gui:
  enabled: true
  host: "0.0.0.0"
  port: 8080

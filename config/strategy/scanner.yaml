active: new_listing

trigger:
  rescan_delay_sec: 300       # 5분마다 재스캔

strategies:
  new_listing:
    listing:
      max_days_since_listed: 730   # 2년까지 확대 → 20개+ 후보 확보
      min_days_since_listed: 1

    liquidity:
      min_24h_turnover_usdt: 3000000  # 300만 USDT로 하향 (후보 풀 확장)

    pool:
      max_candidates: 50              # 50개까지 후보 풀 확장

    scoring:
      volume_weight: 0.35             # 거래량 가중치 상향 (유동성 중시)
      volatility_weight: 0.30         # 변동성 가중치 상향
      momentum_weight: 0.20
      listing_recency_weight: 0.00    # 상장 기간 가중치 제거 (오래된 종목도 동등)
      market_env_weight: 0.15
      min_score: 20                   # 20점까지 하향 (더 많은 종목 모니터링)

    volatility:
      min_atr_pct: 0.2               # 하한 완화
      max_atr_pct: 10.0              # 상한 확대

    momentum:
      rsi_period: 14
      rsi_exclude_below: 10          # 극단 범위 확대
      rsi_exclude_above: 90

    entry_filter:
      cooldown_after_sl_hours: 1     # 쿨다운 1시간으로 단축
      volume_decline_threshold: 0.2  # 더 완화

    market_env:
      ema_periods: [20, 50, 200]
      timeframe: 1h

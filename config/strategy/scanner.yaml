active: new_listing
strategies:
  new_listing:
    entry_filter:
      cooldown_after_sl_hours: 1
      volume_decline_threshold: 0.2
    liquidity:
      min_24h_turnover_usdt: 500000
    listing:
      max_days_since_listed: 30
      min_days_since_listed: 1
    market_env:
      ema_periods:
      - 20
      - 50
      - 200
      timeframe: 1h
    momentum:
      rsi_exclude_above: 90
      rsi_exclude_below: 10
      rsi_period: 14
    pool:
      max_candidates: 50
    scoring:
      listing_recency_weight: 0.0
      market_env_weight: 0.15
      min_score: 5
      momentum_weight: 0.2
      volatility_weight: 0.3
      volume_weight: 0.35
    volatility:
      max_atr_pct: 10.0
      min_atr_pct: 0.2
trigger:
  rescan_delay_sec: 300

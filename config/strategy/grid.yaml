active: grid_bias
exit:
  grid_timeout_hours: 18
  hard_stop_loss_pct: 7.0
strategies:
  grid_bias:
    adaptive_levels:
      enabled: true
      max_levels: 20
      min_levels: 6
      target_spacing_pct: 0.45
    bias:
      btc_eth_weight: 0.2
      ema_periods:
      - 20
      - 50
      ema_weight: 0.5
      enabled: true
      funding_rate:
        enabled: true
        weight: 0.3
      max_level_shift: 4
      threshold: 0.1
    center_method: last_close
    default_buy_levels: 5
    default_sell_levels: 5
    dynamic_spacing:
      atr_lookback_hours: 12
      enabled: true
      high_vol_multiplier: 1.6
      low_vol_multiplier: 0.7
      vol_ratio_high_threshold: 1.8
      vol_ratio_low_threshold: 0.5
    leverage: 7
    max_drawdown_pct: 25.0
    max_open_levels: 10
    max_range_pct: 10.0
    max_symbols: 10
    max_total_exposure_pct: 80.0
    min_range_pct: 1.0
    min_spacing_pct: 0.45
    mtf:
      conflicting_reduce_levels: 2
      ema_fast: 20
      ema_slow: 50
      enabled: true
      range_spacing_multiplier: 0.9
      require_15m_alignment: false
      require_1h_alignment: false
      rsi_bearish_threshold: 45
      rsi_bullish_threshold: 55
      rsi_period: 14
      trend_spacing_multiplier: 1.3
      weight_15m: 0.3
      weight_1h: 0.3
      weight_5m: 0.4
    num_levels: 10
    qty_per_level_pct: 2.5
    range_atr_multiplier: 1.5
    recenter_interval_minutes: 120
    recenter_threshold_pct: 2.5
    stale_fill_revert_seconds: 360

active: grid_bias
exit:
  grid_timeout_hours: 10
  hard_stop_loss_pct: 8.0
strategies:
  grid_bias:
    adaptive_levels:
      enabled: true
      max_levels: 10
      min_levels: 3
      target_spacing_pct: 0.6
    bias:
      btc_eth_weight: 0.5
      ema_periods:
      - 20
      - 50
      ema_weight: 0.5
      enabled: true
      funding_rate:
        enabled: false
        weight: 0.0
      max_level_shift: 3
      threshold: 0.1
    center_method: last_close
    default_buy_levels: 5
    default_sell_levels: 5
    dynamic_spacing:
      atr_lookback_hours: 8
      enabled: true
      high_vol_multiplier: 2.2
      low_vol_multiplier: 0.5
      vol_ratio_high_threshold: 2.5
      vol_ratio_low_threshold: 0.3
    leverage: 6
    max_drawdown_pct: 28.0
    max_open_levels: 5
    max_range_pct: 12.0
    max_symbols: 12
    max_total_exposure_pct: 80.0
    min_range_pct: 1.5
    min_spacing_pct: 0.6
    mtf:
      conflicting_reduce_levels: 3
      ema_fast: 20
      ema_slow: 50
      enabled: true
      range_spacing_multiplier: 0.8
      require_15m_alignment: false
      require_1h_alignment: false
      rsi_bearish_threshold: 45
      rsi_bullish_threshold: 55
      rsi_period: 14
      trend_spacing_multiplier: 1.5
      weight_15m: 0.3
      weight_1h: 0.2
      weight_5m: 0.5
    num_levels: 10
    qty_per_level_pct: 5.0
    range_atr_multiplier: 2.0
    recenter_interval_minutes: 60
    recenter_threshold_pct: 3.5
    stale_fill_revert_seconds: 120

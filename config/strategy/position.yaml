active: volatility_breakout

strategies:
  momentum_scalper:
    ema_fast: 5
    ema_mid: 10
    ema_slow: 20

    rsi_period: 14
    rsi_long_range: [40, 80]        # 진입 범위 대폭 확대
    rsi_short_range: [20, 60]

    volume_lookback: 5
    volume_multiplier: 1.0           # 거래량 기준 완화 (1.2 → 1.0, 평균 이상이면 진입)

    # ADX 추세 강도 필터 (횡보장 진입 방지)
    adx_threshold: 20               # ADX < 20이면 추세 없음으로 판단, 진입 차단

    vwap_enabled: true

    higher_tf:
      enabled: true
      timeframe: 15m
      ema_fast: 5
      ema_slow: 10

    follow_scanner_direction: false   # 스캐너 방향 제한 해제 (양방향 가능)
    min_candles_between_trades: 1     # 재진입 대기 최소화

    # Short 방향 최소 confidence (ADX 포함 confidence로 재조정)
    short_min_confidence: 0.70

    # 자동 튜닝 설정
    tuner:
      enabled: true
      evaluation_window: 30           # 30회 평가마다 튜닝 체크
      min_signal_rate: 0.05           # 시그널 비율 5% 미만이면 완화
      max_signal_rate: 0.30           # 시그널 비율 30% 초과이면 강화
      adjustment_step: 0.1            # 각 파라미터 조절 단위

  volatility_breakout:
    atr_breakout_multiplier: 1.5
    close_position_ratio: 0.7
    volume_multiplier: 1.3
    min_body_ratio: 0.5
    adx_threshold: 20
    min_confidence: 0.5
    min_candles_between_trades: 5

exit:
  stop_loss:
    type: atr
    atr_period: 14
    atr_multiplier: 2.1
    min_pct: 0.3
    max_pct: 2.1

  take_profit:
    type: risk_reward
    risk_reward_ratio: 1.3

  trailing_stop:
    activation_r: 0.7
    callback_atr_multiplier: 0.7

  strategy_exit:
    ema_cross_exit: false
    rsi_reversal_exit: false
    volume_dry_exit: true
    volume_dry_threshold: 0.4

  time_limit:
    max_holding_minutes: 30
    warning_minutes: 25
    force_close_type: market
